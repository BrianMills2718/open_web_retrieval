    type: ProjectDossier
    title: Open Web Retrieval Project Dossier
    tags: [portfolio, shared-infrastructure, retrieval, dossier]
  - path: README.md
    type: ProjectOverview
    title: Open Web Retrieval Overview
    tags: [portfolio, shared-infrastructure, retrieval]
  - path: docs/METHODOLOGY.md
